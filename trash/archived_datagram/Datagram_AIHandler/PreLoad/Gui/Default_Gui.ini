# Default_Gui.ini
# Declarative GUI definition for this datagram.
# Format: [Key]={value} or [Key]=value
#
# Screens define display areas linked to handler functions.
# Buttons trigger actions on the current screen.

[GuiType]=Simple

[Screen 1 Name]={MainDisplay}
[Screen 1 Function]={ImageViewer}
[Screen 1 Image]={DB:Default, IMGMETA:{Main_Images, 'imgID_1'}}

[Button 1 Label]={Exit}
[Button 1 Action]={ExitAppSafely}
[Button 1 Position]={BottomRight}
