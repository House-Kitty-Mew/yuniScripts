# mypy configuration for Auction House Extensions
# See: https://mypy.readthedocs.io/en/stable/config_file.html

[mypy]
python_version = 3.11
strict_optional = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_return_any = True
warn_unreachable = True

# Disable strict mode per-module for gradual adoption
# Uncomment modules as they're fully typed

[mypy-AUCTIONHOUSE.EXTENSIONS._shared.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_PEOPLE.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_TRADE.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_HEALTH_MECHANICS.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_SOCIAL.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_CHAT.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_ANNOUNCE.*]
disallow_untyped_defs = False

[mypy-AUCTIONHOUSE.EXTENSIONS.SIMULATED_RELATIONSHIPS.*]
disallow_untyped_defs = False
