# =============================================================================
# YuniScripts Engine – CI/CD Pipeline
# Runs tests on Ubuntu + Windows across Python 3.10, 3.11, 3.12
# =============================================================================
name: Test Suite

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch: # Allow manual trigger

jobs:
  test:
    name: "${{ matrix.os }} / Python ${{ matrix.python-version }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Report all OS/version results
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-xdist
          # Install engine dependencies
          python start.py --check-only || python start.py --install-only

      - name: Run Core Tests (Process Adoption + Shutdown)
        run: |
          # These test files use a custom inline test framework (not pytest)
          python tests/test_process_adoption.py
          python tests/test_shutdown_graceful.py
          python tests/test_cross_platform.py

      - name: Run Configuration Tests
        run: |
          python -m pytest tests/test_config_loading.py tests/test_config_centralization.py -v --tb=short

      - name: Run Networking Tests
        if: runner.os != 'windows'  # UDP socket tests differ on Windows
        run: |
          python -m pytest tests/test_lan_discovery.py tests/test_lan_networking_v3.py -v --tb=short

      - name: Run Full Test Suite (with coverage)
        run: |
          python -m pytest tests/ --cov=engine --cov-report=xml --cov-report=term --tb=short -v

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: ${{ matrix.os }}-py${{ matrix.python-version }}
          name: yuniserver-${{ matrix.os }}-py${{ matrix.python-version }}
        continue-on-error: true

  lint:
    name: "Lint / Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy

      - name: Run Ruff (fast Python linter)
        run: |
          ruff check engine/ --output-format=github

      - name: Run MyPy (static type check) on core modules
        run: |
          mypy engine/process_adoption.py engine/metadata.py engine/process_wrapper.py --ignore-missing-imports --no-strict-optional
        continue-on-error: true
