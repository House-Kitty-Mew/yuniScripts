# sign_item_keys.ini – encryption keys for Minescript client
# These must MATCH the server-side keys in item-signing-bridge/DATA/players.keys
# Generate with \gen-id in Minecraft chat, or manually:
#   python3 -c "import os, base64; print(base64.b64encode(os.urandom(32)).decode())"
# Format: PlayerName=base64key
# Example:
# CoolPlayer123=abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ
